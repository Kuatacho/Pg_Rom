<app-navbar></app-navbar>

<section
  class="bg-[#f8f6f3] text-white font-[Hatton] flex flex-col justify-center items-center min-h-screen px-6 py-12"
>
  <div
    class="w-full max-w-4xl bg-white text-[#5E0006] rounded-3xl shadow-2xl p-10 flex flex-col justify-center items-center text-center"
  >
    <!-- Título -->
    <h1 class="text-4xl md:text-5xl font-semibold mb-10 text-[#5E0006] tracking-wide">
      Resultados de la lección
    </h1>

    <!-- Promedio -->
    <div class="w-full max-w-md mb-8">
      <h2 class="text-2xl font-medium mb-3">
        Promedio final:
        <span class="text-[#5E0006] font-semibold">{{ promedio }} / 100</span>
      </h2>

      <div class="w-full bg-white rounded-full h-5 overflow-hidden shadow-inner p-1 border border-gray-100/50">

        <div class="h-full rounded-full transition-all duration-1000 ease-out bg-gradient-to-r from-green-400 to-green-600 shadow-[0_2px_10px_rgba(34,197,94,0.4)]"
          [style.width.%]="promedio"
        ></div>
      </div>
    </div>

    <!-- Tabla de resultados -->
    <div class="w-full overflow-x-auto">
      <table class="w-full text-base text-gray-700 border-t border-gray-200">
        <thead>
        <tr class="bg-[#5E0006] text-[#EBEBEB] border-b border-gray-200">
          <th class="py-3 px-4 text-left font-semibold">#</th>
          <th class="py-3 px-4 text-left font-semibold">Gesto</th>
          <th class="py-3 px-4 text-right font-semibold">Nota</th>
        </tr>
        </thead>
        <tbody>
        <tr
          *ngFor="let g of gestosResultados; let i = index"
          class="border-b border-gray-200 hover:bg-gray-50 transition-colors"
        >
          <td class="py-2 px-4">{{ i + 1 }}</td>
          <td class="py-2 px-4 font-medium">{{ g.nombre }}</td>
          <td class="py-2 px-4 text-right">{{ g.nota }}</td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Botones -->
    <div class="mt-10 flex flex-wrap justify-center gap-6">
      <button
        (click)="volverAIntentar()"
        class="bg-[#F5C542] text-white px-8 py-3 rounded-xl font-bold transition-all duration-200 shadow-[0_10px_20px_-5px_rgba(245,197,66,0.5)] hover:shadow-[0_15px_25px_-5px_rgba(245,197,66,0.6)] hover:-translate-y-0.5 active:scale-95"
      >
        Volver a intentar
      </button>

      <button
        (click)="registrarNota()"
        class="bg-[#5E0006] text-white px-8 py-3 rounded-xl font-bold transition-all duration-200 shadow-[0_10px_20px_-5px_rgba(161,123,125,0.5)] hover:shadow-[0_15px_25px_-5px_rgba(161,123,125,0.6)] hover:-translate-y-0.5 active:scale-95"
      >
        Registrar nota
      </button>

<!--      <button-->
<!--        (click)="volverALecciones()"-->
<!--        class="bg-gray-200 text-[#322203] px-8 py-3 rounded-md hover:bg-gray-300 transition font-medium shadow-sm"-->
<!--      >-->
<!--        Volver a lecciones-->
<!--      </button>-->
    </div>
  </div>
</section>
